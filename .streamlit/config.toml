[theme]
base = "light"
primaryColor = "#2563EB"
backgroundColor = "#FBF8F2"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#171717"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
# Sin recarga automática por cambios de archivo: ahorra CPU en producción.
fileWatcherType = "none"

[client]
toolbarMode = "minimal"
