services:
  - type: web
    name: reuniones-ia-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TZ
        value: America/Lima
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_RECORDING_BUCKET
        value: grabaciones-reuniones
      - key: SUPABASE_S3_ENDPOINT
        sync: false
      - key: SUPABASE_S3_REGION
        sync: false
      - key: SUPABASE_S3_ACCESS_KEY_ID
        sync: false
      - key: SUPABASE_S3_SECRET_ACCESS_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TRANSCRIPTION_MODEL
        value: gpt-4o-transcribe-diarize
      - key: OPENAI_GENERATION_MODEL
        value: gpt-4.1-mini
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: VINCORA_INTERNAL_API_KEY
        sync: false

  - type: web
    name: reuniones-ia-frontend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-frontend.txt
    startCommand: streamlit run frontend/app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TZ
        value: America/Lima
      - key: FASTAPI_URL
        sync: false
      - key: DEMO_MODE
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: VINCORA_INTERNAL_API_KEY
        sync: false
