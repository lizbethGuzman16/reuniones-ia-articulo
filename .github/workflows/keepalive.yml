name: Keep API awake
# El plan gratuito de Render duerme el servicio tras ~15 min sin tráfico y el
# arranque en frío (carga de torch) tarda ~2 minutos. Este ping cada 10 minutos
# mantiene la API despierta de 06:00 a 24:00 hora de Perú (11:00-05:00 UTC),
# dejándola dormir de madrugada para no agotar las horas gratuitas del mes.
on:
  schedule:
    - cron: "*/10 11-23 * * *"
    - cron: "*/10 0-4 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health de la API
        run: |
          curl -sS -m 150 -o /dev/null -w "API /health -> %{http_code} en %{time_total}s\n" \
            https://reuniones-ia-api.onrender.com/health || echo "La API no respondió (puede estar despertando)"
